  <!-- 子路径部署（如 GitHub Pages /aoyuar/）时，保证 assets、.patt 相对当前站点目录解析，避免 pattern 404 导致永远识别不到 -->
  <script>
  (function () {
    var path = location.pathname;
    if (!path.endsWith('/')) {
      if (/\.[^/.]+$/.test(path)) path = path.replace(/[^/]+$/, '');
      else path += '/';
    }
    var base = document.createElement('base');
    base.href = location.origin + path;
    document.head.appendChild(base);
  })();
  </script>

  <script>

// =============== 全局变量和状态管理 ===============
let isARStarted = false;
let startOverlay;
/** 当前对准的 marker id */
let currentMarkerId = null;
let loadingInterval = null;
let permissionCheckTimeout = null;
/** 启动前：GLB 文件已预取到浏览器缓存 */
let arModelPrefetchReady = false;
/** 启动前：背景音乐已预取到浏览器缓存 */
let arAudioPrefetchReady = false;
/** 模型已解析且可交互（避免未就绪时白屏、误播音乐、误触手势） */
let arExperienceReady = false;
/** 当前 marker 是否真的由 AR.js 识别到，而不是 object3D 的默认 visible 状态 */
let arMarkerActuallyFound = false;

// 单一 AR 模型（base_basic_shaded.glb）
const instrumentConfig = {
    'marker1': { name: 'AR 模型', model: 'assets/models/base_basic_shaded.glb', isLoaded: false }
};

const AR_BG_MUSIC_ID = 'ar-bg-music';

function getArBackgroundMusic() {
    return document.getElementById(AR_BG_MUSIC_ID);
}

/** 模型已展示在画面上时调用：开始或继续播放 */
function tryPlayArBackgroundMusic() {
    if (!arExperienceReady) return;
    if (!arMarkerActuallyFound || currentMarkerId !== 'marker1') return;
    const world = document.querySelector('#marker1 .aquarium-world');
    if (!world || !world.object3D.visible) return;
    const a = getArBackgroundMusic();
    if (!a) return;
    if (typeof a.volume === 'number') a.volume = 0.72;
    const p = a.play();
    if (p && typeof p.catch === 'function') {
        p.catch((err) => console.warn('AR 背景音乐无法播放（可能被浏览器策略拦截）：', err));
    }
}

function pauseArBackgroundMusic() {
    const a = getArBackgroundMusic();
    if (!a) return;
    a.pause();
}

function stopArBackgroundMusicForExit() {
    const a = getArBackgroundMusic();
    if (!a) return;
    a.pause();
    a.currentTime = 0;
}

function refreshArStartButtonState() {
    const btn = document.getElementById('start-ar-button');
    if (!btn) return;
    if (arModelPrefetchReady && arAudioPrefetchReady) {
        btn.disabled = false;
        btn.textContent = '点我✨启动AR体验';
    } else {
        btn.disabled = true;
        const modelText = arModelPrefetchReady ? '模型已就绪' : '模型加载中';
        const audioText = arAudioPrefetchReady ? '音频已就绪' : '音频加载中';
        btn.textContent = `资源准备中… ${modelText} / ${audioText}`;
    }
}

/** 页面加载时预取 GLB，减少进入 AR 后白屏等待；未完成前禁止点「启动」 */
function prefetchArModelForStart() {
    const cfg = instrumentConfig.marker1;
    if (!cfg || !cfg.model) {
        arModelPrefetchReady = true;
        refreshArStartButtonState();
        return;
    }
    const url = new URL(cfg.model, window.location.href).href;
    fetch(url, { mode: 'cors', cache: 'default' })
        .then((r) => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.arrayBuffer();
        })
        .then(() => {
            arModelPrefetchReady = true;
            refreshArStartButtonState();
        })
        .catch((err) => {
            console.warn('模型预取失败', err);
            arModelPrefetchReady = false;
            refreshArStartButtonState();
            showNotification('模型资源预下载失败，请检查网络后刷新页面', true);
        });
}

/** 页面加载时预取 BGM；不调用 play，避免启动摄像头时误播 */
function prefetchArAudioForStart() {
    const audio = getArBackgroundMusic();
    const src = audio ? audio.getAttribute('src') : 'assets/audio/hologram-koi-hall.mp3';
    if (!src) {
        arAudioPrefetchReady = true;
        refreshArStartButtonState();
        return;
    }
    const url = new URL(src, window.location.href).href;
    fetch(url, { mode: 'cors', cache: 'default' })
        .then((r) => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.arrayBuffer();
        })
        .then(() => {
            arAudioPrefetchReady = true;
            if (audio) {
                audio.load();
            }
            refreshArStartButtonState();
        })
        .catch((err) => {

            arAudioPrefetchReady = false;
            refreshArStartButtonState();
            showNotification('音频资源预下载失败，请检查网络后刷新页面', true);

}

function revertArStartIfModelNotReady(reason) {
    console.warn('AR 启动回退（模型未就绪）:', reason);
    if (permissionCheckTimeout) {
        clearTimeout(permissionCheckTimeout);
        permissionCheckTimeout = null;
    }
    isARStarted = false;
    arExperienceReady = false;
    arMarkerActuallyFound = false;
    const scene = document.getElementById('ar-scene');
    if (scene) scene.classList.remove('active');

/** 场景激活后等待 glTF 解析完成（避免白屏 + 误播音乐） */
async function waitForArModelParsedInScene() {
    const sceneEl = document.getElementById('ar-scene');
    const modelEl = document.getElementById('model1');
    if (!sceneEl || !modelEl) return;

    if (!sceneEl.hasLoaded) {
        await new Promise((resolve) => {
            sceneEl.addEventListener('loaded', resolve, { once: true });
        });
    }

    if (modelEl.getObject3D('mesh')) return;

    const label = (instrumentConfig.marker1 && instrumentConfig.marker1.name) || '3D 模型';

    await new Promise((resolve, reject) => {
        showLoadingOverlay(label);
        const tid = setTimeout(() => {
            cleanup();
            hideLoadingOverlay(false);
            reject(new Error('model-load-timeout'));
        }, 60000);
        const onLoaded = () => {
            cleanup();
            hideLoadingOverlay(true);
            resolve();
        };
        const onError = (e) => {
            cleanup();
            hideLoadingOverlay(false);
            reject(e && e.detail ? e.detail : new Error('model-error'));
        };
        function cleanup() {
            clearTimeout(tid);
            modelEl.removeEventListener('model-loaded', onLoaded);
            modelEl.removeEventListener('model-error', onError);
        }
        modelEl.addEventListener('model-loaded', onLoaded);
        modelEl.addEventListener('model-error', onError);
    });
}

    return {
        isIOS: /iPhone|iPad|iPod/i.test(ua),
        isWeChat: /MicroMessenger/i.test(ua),
        isAndroid: /Android/i.test(ua),

    };
}

// 检查摄像头权限状态
async function checkCameraPermission() {
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.warn('getUserMedia not supported');
            return 'unsupported';
        }

        // 尝试获取摄像头流
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' }
        });
        
        // 如果成功获取，立即关闭流并返回granted
        stream.getTracks().forEach(track => track.stop());
        return 'granted';
        
    } catch (error) {
        console.log('Camera permission check failed:', error.name, error.message);
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
            return 'denied';
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
            return 'no-camera';
        } else {
            return 'error';
        }
    }
}

// 监听AR.js场景错误
function setupARSceneErrorHandling() {
    const arScene = document.getElementById('ar-scene');
    if (!arScene) return;

    // 监听A-Frame的错误事件
    arScene.addEventListener('ar-error', function(event) {
        console.error('AR Error:', event.detail);
        handleARError(event.detail);
    });

    // 监听A-Frame场景的加载错误
    arScene.addEventListener('loaded', function() {
        console.log('AR scene loaded successfully');
        clearTimeout(permissionCheckTimeout);
    });

    // 设置超时检测，如果AR场景在一定时间内没有正常启动，可能是权限问题
    arScene.addEventListener('renderstart', function() {
        console.log('AR rendering started');
        clearTimeout(permissionCheckTimeout);
    });
}

// 处理AR错误
function handleARError(error) {
    console.error('Handling AR error:', error);
    
    // 检查是否是权限相关的错误
    if (error && (
        error.message && error.message.includes('Permission') ||
        error.name === 'NotAllowedError' ||
        error.toString().includes('permission')
    )) {
        setTimeout(() => {
            showPermissionErrorOverlay();
        }, 500);
    }
}

// 识别 marker 后显示鱼缸世界；鱼模型已在 HTML 中挂载 gltf-model
AFRAME.registerComponent('instrument-handler', {
    init: function () {
        this.marker = this.el;
        this.markerId = this.marker.id;
        this.config = instrumentConfig[this.markerId];
        
        if (!this.config) {
            console.warn(`No config found for ${this.markerId}, skipping initialization.`);
            return;
        }

        this.worldEntity = this.marker.querySelector('.aquarium-world');
        this.modelEntity = this.marker.querySelector('[gltf-model]');
        this.isMarkerFound = false;
        this.worldEntity.setAttribute('visible', false);

        // 模型由 HTML 的 gltf-model 直接加载；此处监听完成/失败与重试
        let modelRetryCount = 0;
        const maxModelRetries = 3;
        const modelLoadHandler = () => {
            console.log(`${this.config.name} model loaded.`);
            this.config.isLoaded = true;
            hideLoadingOverlay(true);
            if (this.isMarkerFound && arExperienceReady) {
                this.worldEntity.setAttribute('visible', true);
                tryPlayArBackgroundMusic();
            }
            this.modelEntity.removeEventListener('model-loaded', modelLoadHandler);
            this.modelEntity.removeEventListener('model-error', modelErrorHandler);
        };
        const modelErrorHandler = (e) => {
            modelRetryCount++;
            console.error(`Error loading model for ${this.markerId} (Attempt ${modelRetryCount}):`, e.detail);
            if (modelRetryCount < maxModelRetries) {
                showNotification(`${this.config.name} 模型加载失败，第 ${modelRetryCount} 次重试中...`, true);
                setTimeout(() => {
                    this.modelEntity.setAttribute('gltf-model', `url(${this.config.model})`);
                }, 1500 * modelRetryCount);
            } else {
                console.error(`All ${maxModelRetries} attempts failed for model ${this.config.name}.`);
                hideLoadingOverlay(false);
                showNotification(`${this.config.name} 模型加载失败，请检查网络后重试`, true);
                this.modelEntity.removeEventListener('model-loaded', modelLoadHandler);
                this.modelEntity.removeEventListener('model-error', modelErrorHandler);
            }
        };
        this.modelEntity.addEventListener('model-loaded', modelLoadHandler);
        this.modelEntity.addEventListener('model-error', modelErrorHandler);

        // 子实体 gltf-model 若先于本组件完成加载，model-loaded 可能已触发过，需补判
        if (this.modelEntity.getObject3D('mesh')) {
            this.config.isLoaded = true;
            this.modelEntity.removeEventListener('model-loaded', modelLoadHandler);
            this.modelEntity.removeEventListener('model-error', modelErrorHandler);
        }

        this.marker.addEventListener('markerFound', this.onMarkerFound.bind(this));
        this.marker.addEventListener('markerLost', this.onMarkerLost.bind(this));
    },

    onMarkerFound: function () {
        console.log(`Marker found: ${this.markerId} (${this.config.name})`);
        this.isMarkerFound = true;
        arMarkerActuallyFound = true;
        currentMarkerId = this.markerId;
        if (this.config.isLoaded && arExperienceReady) {
            this.worldEntity.setAttribute('visible', true);
            tryPlayArBackgroundMusic();
        }
    },

    onMarkerLost: function () {
        console.log(`Marker lost: ${this.markerId}. State will be preserved.`);
        this.isMarkerFound = false;
        arMarkerActuallyFound = false;
        this.worldEntity.setAttribute('visible', false);
        pauseArBackgroundMusic();
        if (currentMarkerId === this.markerId) {
            currentMarkerId = null;
        }
    }
});

// 鱼在 marker 上方沿平滑 3D 曲线游动（无扭转），保持自然巡游感
AFRAME.registerComponent('fish-swim', {
    schema: {
        radiusX:   { type: 'number', default: 0.48 },
        radiusZ:   { type: 'number', default: 0.34 },
        centerY:   { type: 'number', default: 0.58 },
        speed:     { type: 'number', default: 0.00065 },
        bob:       { type: 'number', default: 0.07 },
        yawOffset: { type: 'number', default: 0 },
        phase:     { type: 'number', default: -1 },
        turnLerp:  { type: 'number', default: 0.08 },
        // 摆尾 S 曲线：沿模型自身 Y 轴正弦摇摆
        tailAmp:   { type: 'number', default: 18 },    // 最大摆角（度）
        tailSpeed: { type: 'number', default: 0.006 }  // 摆尾频率（独立于巡游速度）
    },
    init: function () {
        this.phase = this.data.phase >= 0 ? this.data.phase : Math.random() * Math.PI * 2;
        this.currentYaw = this.data.yawOffset;
    },
    getCurvePoint: function (t) {
        const x = Math.cos(t) * this.data.radiusX;
        const z = Math.sin(t) * this.data.radiusZ;
        const y = this.data.centerY + Math.sin(t * 0.55 + 0.7) * this.data.bob;
        return { x, y, z };
    },
    tick: function (time) {
        const t = time * this.data.speed + this.phase;
        const p = this.getCurvePoint(t);
        const next = this.getCurvePoint(t + 0.02);

        // 路径切线朝向（平滑插值）
        const targetYaw = THREE.Math.radToDeg(Math.atan2(next.x - p.x, next.z - p.z)) + this.data.yawOffset;
        const yawDiff = (((targetYaw - this.currentYaw) + 540) % 360) - 180;
        this.currentYaw += yawDiff * this.data.turnLerp;

        // 摆尾：绕自身 Y 轴叠加正弦偏转，呈 S 型动态游动感
        const tailSwing = Math.sin(time * this.data.tailSpeed + this.phase * 2.3) * this.data.tailAmp;

        this.el.object3D.position.set(p.x, p.y, p.z);
        this.el.object3D.rotation.set(
            0,
            THREE.Math.degToRad(this.currentYaw + tailSwing),
            0
        );
    }
});

// 鱼模型：实心 / 发光线框二选一；切换时沿世界 Y 扫描过渡（扫描带高亮）
AFRAME.registerComponent('wireframe-glow', {
    schema: {
        color: { type: 'color', default: '#aeefff' },
        opacity: { type: 'number', default: 0.9 },
        breathSpeed: { type: 'number', default: 0.002 },
        transitionMs: { type: 'number', default: 980 }
    },
    init: function () {
        this.wires = [];
        this.mode = 'solid';
        this._transition = null;
        this._solidPatches = [];
        this._box = new THREE.Box3();
        this._tmpVec = new THREE.Vector3();
        this._wireUniforms = null;
        this.el.addEventListener('model-loaded', () => {
            this.buildOverlay();
            this.patchSolidMaterials();
            this.setMode(this.mode, true);
        });
        if (this.el.getObject3D('mesh')) {
            this.buildOverlay();
            this.patchSolidMaterials();
            this.setMode(this.mode, true);
        }
    },
    buildOverlay: function () {
        if (this.wires.length) return;
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        const data = this.data;
        const c = new THREE.Color(data.color);
        const u = {
            uColor: { value: new THREE.Vector3(c.r, c.g, c.b) },
            uOpacity: { value: data.opacity },
            uScan: { value: 0 },
            uTransitioning: { value: 0 },
            uToWire: { value: 1 },
            uWorldYMin: { value: 0 },
            uWorldYMax: { value: 1 }
        };
        this._wireUniforms = u;
        const wireVS = `
attribute vec3 position;
uniform mat4 modelMatrix;
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
varying float vWorldY;
void main() {
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorldY = wp.y;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;
        const wireFS = `
uniform vec3 uColor;
uniform float uOpacity;
uniform float uWorldYMin;
uniform float uWorldYMax;
uniform float uScan;
uniform float uTransitioning;
uniform float uToWire;
varying float vWorldY;
void main() {
  float span = max(uWorldYMax - uWorldYMin, 1e-5);
  float st = clamp((vWorldY - uWorldYMin) / span, 0.0, 1.0);
  float p = uScan;
  float showLine;
  if (uToWire > 0.5) {
    showLine = 1.0 - smoothstep(p - 0.16, p + 0.03, st);
  } else {
    showLine = smoothstep(p - 0.03, p + 0.16, st);
  }
  float band = smoothstep(p - 0.058, p - 0.014, st) * (1.0 - smoothstep(p + 0.014, p + 0.058, st));
  float baseA = uOpacity * mix(1.0, showLine, uTransitioning);
  float bandBoost = band * uTransitioning * 0.75;
  vec3 glow = uColor + vec3(0.28, 0.92, 1.0) * band * uTransitioning * 1.35;
  gl_FragColor = vec4(glow, clamp(baseA + bandBoost, 0.0, 1.0));
}`;
        const wireMat = new THREE.ShaderMaterial({
            uniforms: u,
            vertexShader: wireVS,
            fragmentShader: wireFS,
            transparent: true,
            depthWrite: false,
            depthTest: false,
            blending: THREE.AdditiveBlending,
            toneMapped: false,
            fog: false
        });
        mesh.traverse((node) => {
            if (node.isMesh && node.geometry) {
                const wireGeo = new THREE.WireframeGeometry(node.geometry);
                const lines = new THREE.LineSegments(wireGeo, wireMat);
                lines.userData.isWireframeOverlay = true;
                lines.renderOrder = 999;
                lines.frustumCulled = false;
                lines.visible = false;
                node.add(lines);
                this.wires.push({ lines, mesh: node, mat: wireMat });
            }
        });
    },
    patchSolidMaterials: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh || this._solidPatches.length) return;
        const injectFrag = (shader) => {
            const fragTail = [
                ['#include <dithering_fragment>', 'SCAN_FRAG'],
                ['#include <opaque_fragment>', 'SCAN_FRAG'],
                ['#include <output_fragment>', 'SCAN_FRAG']
            ];
            const scanBlock = `
            {
              float span = max(uWorldYMax - uWorldYMin, 1e-5);
              float st = clamp((vWorldPosScan.y - uWorldYMin) / span, 0.0, 1.0);
              float p = uScan;
              float solidKeep;
              if (uToWire > 0.5) {
                solidKeep = smoothstep(p - 0.12, p + 0.07, st);
              } else {
                solidKeep = 1.0 - smoothstep(p - 0.07, p + 0.12, st);
              }
              float band = smoothstep(p - 0.055, p - 0.014, st) * (1.0 - smoothstep(p + 0.014, p + 0.055, st));
              if (uTransitioning > 0.5) {
                diffuseColor.rgb *= mix(0.18, 1.0, solidKeep);
                diffuseColor.a *= solidKeep;
                diffuseColor.rgb += vec3(0.22, 0.88, 1.0) * band * 0.95;
              }
            }
            `;
            for (let i = 0; i < fragTail.length; i++) {
                if (shader.fragmentShader.indexOf(fragTail[i][0]) !== -1) {
                    shader.fragmentShader = shader.fragmentShader.replace(
                        fragTail[i][0],
                        scanBlock + fragTail[i][0]
                    );
                    return;
                }
            }
        };
        mesh.traverse((node) => {
            if (!node.isMesh || !node.material) return;
            const mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach((mat) => {
                if (!mat || mat.userData._scanPatched) return;
                if (!mat.isMeshStandardMaterial && !mat.isMeshPhysicalMaterial) return;
                const uniforms = {
                    uScan: { value: 0 },
                    uTransitioning: { value: 0 },
                    uToWire: { value: 1 },
                    uWorldYMin: { value: 0 },
                    uWorldYMax: { value: 1 }
                };
                mat.userData._scanUniforms = uniforms;
                mat.userData._scanPatched = true;
                mat.onBeforeCompile = (shader) => {
                    const uniDecl =
                        'uniform float uScan;\n' +
                        'uniform float uTransitioning;\n' +
                        'uniform float uToWire;\n' +
                        'uniform float uWorldYMin;\n' +
                        'uniform float uWorldYMax;\n' +
                        'varying vec3 vWorldPosScan;\n';
                    shader.uniforms.uScan = uniforms.uScan;
                    shader.uniforms.uTransitioning = uniforms.uTransitioning;
                    shader.uniforms.uToWire = uniforms.uToWire;
                    shader.uniforms.uWorldYMin = uniforms.uWorldYMin;
                    shader.uniforms.uWorldYMax = uniforms.uWorldYMax;
                    shader.vertexShader = uniDecl + shader.vertexShader;
                    shader.fragmentShader = uniDecl + shader.fragmentShader;
                    shader.vertexShader = shader.vertexShader.replace(
                        '#include <project_vertex>',
                        `vec4 wPosScan = modelMatrix * vec4( transformed, 1.0 );
                        vWorldPosScan = wPosScan.xyz;
                        #include <project_vertex>`
                    );
                    injectFrag(shader);
                };
                this._solidPatches.push({ mat });
            });
        });
    },
    updateWorldYBounds: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        this._box.setFromObject(mesh);
        const minY = this._box.min.y;
        const maxY = this._box.max.y;
        if (this._wireUniforms) {
            this._wireUniforms.uWorldYMin.value = minY;
            this._wireUniforms.uWorldYMax.value = maxY;
        }
        this._solidPatches.forEach(({ mat }) => {
            const u = mat.userData._scanUniforms;
            if (u) {
                u.uWorldYMin.value = minY;
                u.uWorldYMax.value = maxY;
            }
        });
    },
    setMaterialVisible: function (mat, v) {
        if (!mat) return;
        if (Array.isArray(mat)) mat.forEach(m => { if (m) m.visible = v; });
        else mat.visible = v;
    },
    setMode: function (mode, immediate) {
        this.mode = mode;
        if (!this.wires.length) return;
        const showSolid = mode === 'solid';
        const showWire = mode === 'wireframe';
        this.wires.forEach(({ lines, mesh }) => {
            this.setMaterialVisible(mesh.material, showSolid);
            lines.visible = showWire;
        });
        if (immediate && this._wireUniforms) {
            this._wireUniforms.uTransitioning.value = 0;
            this._wireUniforms.uScan.value = mode === 'wireframe' ? 1 : 0;
        }
        this._solidPatches.forEach(({ mat }) => {
            const u = mat.userData._scanUniforms;
            if (u && immediate) {
                u.uTransitioning.value = 0;
                u.uScan.value = mode === 'wireframe' ? 1 : 0;
            }
        });
    },
    beginTransition: function (targetMode) {
        if (!this.wires.length) return;
        if (this._transition) return;
        if (targetMode === this.mode) return;
        this._transition = {
            from: this.mode,
            to: targetMode,
            start: performance.now()
        };
        this._wireUniforms.uTransitioning.value = 1;
        this._wireUniforms.uToWire.value = targetMode === 'wireframe' ? 1 : 0;
        this._wireUniforms.uScan.value = 0;
        this._solidPatches.forEach(({ mat }) => {
            const u = mat.userData._scanUniforms;
            if (u) {
                u.uTransitioning.value = 1;
                u.uToWire.value = targetMode === 'wireframe' ? 1 : 0;
                u.uScan.value = 0;
            }
            mat.transparent = true;
        });
        this.wires.forEach(({ lines, mesh }) => {
            this.setMaterialVisible(mesh.material, true);
            lines.visible = true;
        });
    },
    easeInOutCubic: function (t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    },
    finishTransition: function () {
        const to = this._transition.to;
        this._transition = null;
        this.setMode(to, true);
        updateModeButtonLabel(to);
    },
    tick: function (time) {
        this.updateWorldYBounds();
        if (this._wireUniforms && this.wires.length) {
            if (!this._transition) {
                const breath = 0.55 + 0.45 * Math.sin(time * this.data.breathSpeed);
                const base = this.data.opacity;
                this._wireUniforms.uOpacity.value = base * (0.55 + 0.45 * breath);
            } else {
                this._wireUniforms.uOpacity.value = this.data.opacity;
            }
        }
        if (!this._transition) return;
        const { start, to } = this._transition;
        const dur = this.data.transitionMs;
        let t = (performance.now() - start) / dur;
        if (t >= 1) {
            this.finishTransition();
            return;
        }
        t = this.easeInOutCubic(t);
        if (this._wireUniforms) this._wireUniforms.uScan.value = t;
        this._solidPatches.forEach(({ mat }) => {
            const u = mat.userData._scanUniforms;
            if (u) u.uScan.value = t;
        });
    }
});

}

// 气泡从鱼缸底部向上漂浮，增加水下氛围
AFRAME.registerComponent('bubble-rise', {
    schema: {
        minY: { type: 'number', default: 0.08 },
        maxY: { type: 'number', default: 0.88 },
        speed: { type: 'number', default: 0.00035 },
        sway: { type: 'number', default: 0.04 }
    },
    init: function () {
        this.phase = Math.random() * Math.PI * 2;
        this.basePosition = this.el.object3D.position.clone();
    },
    tick: function (time) {
        const range = this.data.maxY - this.data.minY;
        const progress = (time * this.data.speed + this.phase) % 1;
        const y = this.data.minY + progress * range;
        const swayX = Math.sin(time * 0.002 + this.phase) * this.data.sway;
        const swayZ = Math.cos(time * 0.0017 + this.phase) * this.data.sway;
        this.el.setAttribute('position', `${this.basePosition.x + swayX} ${y} ${this.basePosition.z + swayZ}`);
    }
});

// 保留手势交互：单指旋转整个鱼缸，双指缩放整个鱼缸
AFRAME.registerComponent('touch-handler', {
    schema: {
        rotateSensitivity: { type: 'number', default: 0.006 },
        minScale: { type: 'number', default: 0.6 },
        maxScale: { type: 'number', default: 2.4 }
    },
    init: function () {
        this.onTouchStart = this.onTouchStart.bind(this);
        this.onTouchMove = this.onTouchMove.bind(this);
        this.onTouchEnd = this.onTouchEnd.bind(this);
        this.el.sceneEl.addEventListener('touchstart', this.onTouchStart);
        this.el.sceneEl.addEventListener('touchmove', this.onTouchMove);
        this.el.sceneEl.addEventListener('touchend', this.onTouchEnd);
        this.isDragging = false;
        this.isPinching = false;
        this.previousTouchPosition = { x: 0, y: 0 };
        this.initialPinchDistance = 0;
        this.markerId = this.el.parentElement.id;
        this.initialScale = this.el.object3D.scale.clone();
    },
    isThisMarkerActive: function() {
        return arExperienceReady && currentMarkerId === this.markerId;
    },
    onTouchStart: function (e) {
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        if (e.touches.length === 1) {
            this.isDragging = true;
            this.isPinching = false;
            this.previousTouchPosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            this.isDragging = false;
            this.isPinching = true;
            this.initialPinchDistance = this.getDistance(e.touches[0], e.touches[1]);
        }
    },
    onTouchMove: function (e) {
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        if (this.isDragging && e.touches.length === 1) {
            const deltaX = e.touches[0].clientX - this.previousTouchPosition.x;
            const deltaY = e.touches[0].clientY - this.previousTouchPosition.y;
            this.el.object3D.rotation.y += deltaX * this.data.rotateSensitivity;
            this.el.object3D.rotation.x += deltaY * this.data.rotateSensitivity;
            this.previousTouchPosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        if (this.isPinching && e.touches.length === 2) {
            if (this.initialPinchDistance <= 0) return;
            const currentPinchDistance = this.getDistance(e.touches[0], e.touches[1]);
            const scaleFactor = currentPinchDistance / this.initialPinchDistance;
            const nextScale = this.el.object3D.scale.x * scaleFactor;
            const relativeScale = nextScale / this.initialScale.x;
            if (relativeScale >= this.data.minScale && relativeScale <= this.data.maxScale) {
                this.el.object3D.scale.multiplyScalar(scaleFactor);
            }
            this.initialPinchDistance = currentPinchDistance;
        }
    },
    onTouchEnd: function (e) {
        if (e.touches.length < 2) this.isPinching = false;
        if (e.touches.length < 1) this.isDragging = false;
    },
    getDistance: function (touch1, touch2) {
        const dx = touch1.clientX - touch2.clientX;
        const dy = touch1.clientY - touch2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    },
    remove: function () {
        this.el.sceneEl.removeEventListener('touchstart', this.onTouchStart);
        this.el.sceneEl.removeEventListener('touchmove', this.onTouchMove);
        this.el.sceneEl.removeEventListener('touchend', this.onTouchEnd);
    }
});


function showNotification(message, isError = false) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'rgba(211, 47, 47, 0.8)' : 'rgba(0, 0, 0, 0.8)'};
        color: white; padding: 12px 20px; border-radius: 25px;
        font-size: 14px; z-index: 10000; pointer-events: none; transition: opacity 0.3s; opacity: 1;`;
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.remove(), 300);
    }, 2500);
}

function showLoadingOverlay(instrumentName) {
    const overlay = document.getElementById('loading-overlay');
    const title = document.getElementById('loading-title');
    const progressBar = document.getElementById('progress-bar');
    const text = document.getElementById('loading-text');

    if (!overlay) return;

    title.textContent = instrumentName ? `正在加载：${instrumentName}` : '正在加载…';
    progressBar.style.width = '0%';
    text.textContent = '0% - 请稍候...';
    overlay.classList.remove('hidden');

    let progress = 0;
    loadingInterval = setInterval(() => {
        progress += Math.random() * 5;
        if (progress > 95) {
            progress = 95;
            clearInterval(loadingInterval);
        }
        progressBar.style.width = `${progress}%`;
        text.textContent = `${Math.round(progress)}% - 请稍候...`;
    }, 200);
}

function hideLoadingOverlay(isSuccess) {
    const overlay = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('progress-bar');
    const text = document.getElementById('loading-text');

    if (!overlay) return;

    clearInterval(loadingInterval);
    loadingInterval = null;

    if (isSuccess) {
        progressBar.style.width = '100%';
        text.textContent = '加载完成!';
        setTimeout(() => {
            overlay.classList.add('hidden');
        }, 500);
    } else {
        overlay.classList.add('hidden');
    }
}

// 修改：startAR 函数 - 添加权限检测
async function startAR() {
    if (isARStarted) return;
    if (!arModelPrefetchReady) {
        showNotification('模型资源尚未就绪，请稍候', true);
        return;
    }
    if (!arAudioPrefetchReady) {
        showNotification('音频资源尚未就绪，请稍候', true);
        return;
    }
    console.log('启动AR体验');
    
    // 检查权限状态
    const permissionStatus = await checkCameraPermission();
    console.log('Permission status:', permissionStatus);
    
    if (permissionStatus === 'denied') {
        console.log('Camera permission denied, showing error overlay');
        showPermissionErrorOverlay();
        return;
    } else if (permissionStatus === 'no-camera') {
        showNotification('❌ 未检测到摄像头设备', true);
        return;
    } else if (permissionStatus === 'unsupported') {
        showNotification('❌ 浏览器不支持摄像头功能', true);
        return;
    } else if (permissionStatus === 'error') {
        showNotification('⚠️ 摄像头访问出现错误，请重试', true);
        return;
    }
    
    // 权限正常：先激活场景并等待模型解析，避免白屏 / 误播 BGM
    document.getElementById('ar-scene').classList.add('active');
    startOverlay.classList.add('hidden');

    try {
        await waitForArModelParsedInScene();
    } catch (e) {
        revertArStartIfModelNotReady(e);
        return;
    }

    arExperienceReady = true;
    isARStarted = true;
    syncMusicIfMarkerAlreadyVisible();
    const modeBtn = document.getElementById('mode-toggle-btn');
    if (modeBtn) modeBtn.classList.add('active');
    
    // 设置超时检测，防止权限在启动过程中被拒绝
    permissionCheckTimeout = setTimeout(() => {
        // 如果5秒后还没有成功启动，可能存在权限问题
        const videos = document.querySelectorAll('video');
        if (videos.length === 0 || !videos[0].srcObject) {
            console.log('AR failed to start properly, checking permissions...');
            checkCameraPermission().then(status => {
                if (status === 'denied') {
                    showPermissionErrorOverlay();
                }
            });
        }
    }, 5000);
    
    applyIOSVideoFix();
}

function applyIOSVideoFix() {
    const device = getDeviceInfo();
    if (!device.isIOS) {
        return;
    }
    console.log("Applying iOS video fix...");
    let fixAttempts = 0;
    const maxAttempts = 20;
    
    const fixVideoElements = () => {
        fixAttempts++;
        const videos = document.querySelectorAll('video');
        
        if (videos.length > 0) {
            console.log(`Found ${videos.length} video element(s). Applying attributes.`);
            videos.forEach(video => {
                if (!video.hasAttribute('data-ios-fixed')) {
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    video.setAttribute('muted', '');
                    video.setAttribute('autoplay', '');
                    video.setAttribute('data-ios-fixed', 'true');
                    video.play().catch(e => console.warn("Initial video play failed, this is often expected.", e));
                }
            });
            // 清除权限检测超时
            clearTimeout(permissionCheckTimeout);
            return;
        }
        
        if (fixAttempts < maxAttempts) {
            setTimeout(fixVideoElements, 300);
        } else {
            console.warn("Could not find video element to apply iOS fix after multiple attempts.");
        }
    };
    
    setTimeout(fixVideoElements, 500);
}

function handlePermissionDenied() {
    console.log('检测到权限被拒绝');
    const device = getDeviceInfo();
    const deniedOverlay = document.createElement('div');
    deniedOverlay.className = 'permission-denied-overlay';
    deniedOverlay.innerHTML = `
        <div class="start-title">📷 摄像头权限被拒绝</div>
        <div class="start-subtitle">需要重新授权才能使用AR功能</div>
        <div class="permission-guide">
            <div class="guide-title">🔧 重新授权指南</div>
            <div class="guide-text">请按照以下步骤重新授权摄像头权限</div>
            ${device.isIOS ? `
                <div class="reauth-steps">
                    <div class="reauth-step"><div class="step-number">1</div><div class="step-content"><div class="step-text">点击地址栏左侧的🔒图标</div><div class="step-desc">或长按地址栏查看网站信息</div></div></div>
                    <div class="reauth-step"><div class="step-number">2</div><div class="step-content"><div class="step-text">找到"摄像头"选项</div><div class="step-desc">将其设置为"允许"</div></div></div>
                    <div class="reauth-step"><div class="step-number">3</div><div class="step-content"><div class="step-text">刷新页面重新开始</div><div class="step-desc">或点击下方"重新尝试"按钮</div></div></div>
                </div>
            ` : `
                <div class="simple-steps">
                    <div>• 点击地址栏左侧的摄像头图标</div>
                    <div>• 选择"始终允许"或"允许"</div>
                    <div>• 刷新页面重新开始</div>
                </div>
            `}
        </div>
        <div class="denied-buttons">
            <button class="start-button retry-btn" onclick="retryPermission()">🔄 重新尝试</button>
            <button class="start-button refresh-btn" onclick="refreshPage()">🔃 刷新页面</button>
            <button class="start-button back-btn" onclick="backToStart()">⬅️ 返回开始</button>
        </div>
        <div style="font-size: 0.9em; opacity: 0.8; margin-top: 15px;">💡 如果问题持续存在，建议在Safari中打开</div>
    `;
    document.body.appendChild(deniedOverlay);
}

function retryPermission() {
    const deniedUI = document.querySelector('.permission-denied-overlay');
    if (deniedUI) deniedUI.remove();
    hidePermissionErrorOverlay();
    isARStarted = false;
    startAR();
}

function refreshPage() { 
    window.location.reload(); 
}

function backToStart() {
    const deniedUI = document.querySelector('.permission-denied-overlay');
    if (deniedUI) deniedUI.remove();
    hidePermissionErrorOverlay();
    document.getElementById('ar-scene').classList.remove('active');
    startOverlay.classList.remove('hidden');
    const modeBtn = document.getElementById('mode-toggle-btn');
    if (modeBtn) modeBtn.classList.remove('active');
    isARStarted = false;
    arExperienceReady = false;
    arMarkerActuallyFound = false;
    stopArBackgroundMusicForExit();
}

document.addEventListener('DOMContentLoaded', function() {
    console.log('页面加载完成，准备启动AR。');
    createStartOverlay();
    prefetchArModelForStart();
    prefetchArAudioForStart();
    
    // 设置AR场景错误处理
    setupARSceneErrorHandling();
    
    // 保留原有的错误监听器作为后备
    window.addEventListener('unhandledrejection', function(event) {
        if (isARStarted && event.reason && (event.reason.name === 'NotAllowedError' || (event.reason.message && event.reason.message.includes('not allowed')))) {
            console.log('捕获到权限拒绝错误 (unhandledrejection)');
            event.preventDefault();
            setTimeout(() => {
                showPermissionErrorOverlay();
            }, 500);
        }
    });
    
    // 新增：监听getUserMedia错误
    window.addEventListener('error', function(event) {
        if (event.error && (
            event.error.name === 'NotAllowedError' || 
            event.error.message.includes('Permission') ||
            event.error.message.includes('denied')
        )) {
            console.log('捕获到权限拒绝错误 (error event)');
            setTimeout(() => {
                showPermissionErrorOverlay();
            }, 500);
        }
    });
});
