<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Mini Synth Workstation</title>
  <link rel="stylesheet" href="./assets/style.css?v=20260527-entry-gate-v1">
  <script>
    (() => {
      const local = ["localhost", "127.0.0.1"].includes(location.hostname);
      const params = new URLSearchParams(location.search);
      const key = "arSynthAccessGranted";
      if (params.get("access") === "granted") sessionStorage.setItem(key, "yes");
      if (!local && sessionStorage.getItem(key) !== "yes") {
        location.replace("./access.html");
      }
    })();
  </script>
</head>
<body>
  <section class="welcome-screen" id="welcome-screen" aria-label="平台欢迎页">
    <div class="welcome-content">
      <h1>欢迎来到乐器增强现实（AR）视听云平台</h1>
      <p>先用微信扫描平台入口码进入演示页；进入后打开相机，对准合成器乐器卡，AR 合成器只在乐器卡被识别时显示。</p>
      <button class="welcome-start" id="start-ar" type="button">启动 AR 体验</button>
    </div>
  </section>

  <main class="app-shell">
    <section class="instrument-deck">
      <section class="ar-stage awaiting-camera" id="ar-stage" aria-label="AR Mini Synth Workstation">
        <video class="camera-feed" id="camera-feed" autoplay muted playsinline webkit-playsinline></video>
        <canvas id="synth-canvas"></canvas>
        <div class="stage-hud">
          <button class="small-btn" id="camera-toggle" type="button">打开相机</button>
          <button class="small-btn" id="reset-view" type="button">重置视角</button>
        </div>
        <div class="stage-prompt" id="stage-prompt">请允许相机</div>
      </section>
    </section>
  </main>

  <script type="module" src="./assets/app.js?v=20260527-entry-gate-v1"></script>
</body>
</html>
