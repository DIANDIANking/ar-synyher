<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Mini Synth Workstation</title>
  <link rel="stylesheet" href="./assets/style.css?v=20260529-arjs-v1">
  <!-- A-Frame + AR.js -->
  <script src="./assets/aframe.min.js?v=20260529-arjs-v1"></script>
  <script src="./assets/aframe-ar.js?v=20260529-arjs-v1"></script>
</head>
<body>
  <section class="welcome-screen" id="welcome-screen" aria-label="平台欢迎页">
    <div class="welcome-content">
      <h1>欢迎来到乐器增强现实（AR）视听云平台</h1>
      <p>先用微信扫描平台入口码进入演示页；进入后打开相机，对准乐器卡，AR 乐器只在乐器卡被识别时显示。</p>
      <button class="welcome-start" id="start-ar" type="button">启动 AR 体验</button>
    </div>
  </section>

  <main class="app-shell">
    <section class="instrument-deck">
      <section class="ar-stage awaiting-camera" id="ar-stage" aria-label="AR Mini Synth Workstation">
        <!-- A-Frame AR Scene -->
        <a-scene
          id="ar-scene"
          embedded
          vr-mode-ui="enabled: false"
          renderer="logarithmicDepthBuffer: true; alpha: true;"
          arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5; labelingMode: black_region;"
          style="display: none; position: absolute; inset: 0; z-index: 1;">

          <!-- Synthesizer marker -->
          <a-marker
            id="marker-synth"
            type="pattern"
            url="./assets/markers/synth.patt"
            instrument-marker="instrument: synth">
          </a-marker>

          <!-- Drum machine marker -->
          <a-marker
            id="marker-drum"
            type="pattern"
            url="./assets/markers/drum.patt"
            instrument-marker="instrument: drum">
          </a-marker>

          <a-entity camera></a-entity>
        </a-scene>

        <div class="stage-hud">
          <button class="small-btn" id="reset-view" type="button">重置视角</button>
        </div>
        <div class="stage-prompt" id="stage-prompt">请允许相机</div>
      </section>
    </section>
  </main>
  <section class="ar-debug-panel" id="ar-debug-panel" aria-label="AR 调试信息"></section>

  <script type="module" src="./assets/app.js?v=20260529-arjs-v1"></script>
</body>
</html>
